# Windows: NSIS installer (.exe). macOS: .dmg for x64 and arm64.
# Create a GitHub Release: git tag v2.1.0 && git push origin v2.1.0
# workflow_dispatch: builds installers only; download from the workflow run’s Artifacts (no Release unless you used a tag push).
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app (Angular + Electron main)
        run: npm run build:all

      - name: Package Windows installer
        run: npx electron-builder --win nsis --publish never

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe

  build-mac:
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app (Angular + Electron main)
        run: npm run build:all

      - name: Package macOS disk images
        run: npx electron-builder --mac dmg --x64 --arm64 --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: release/*.dmg

  publish:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '*'
          merge-multiple: true

      - name: Flatten artifacts for release
        run: |
          mkdir -p dist
          find artifacts -type f \( -name '*.exe' -o -name '*.dmg' \) -exec cp -f {} dist/ \;
          ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
